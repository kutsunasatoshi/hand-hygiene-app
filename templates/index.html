<h1>アルコール使用量入力</h1>

<form method="post">

スタッフID

<br>

<input type="text" name="staff_id" required>

<br><br>

アルコール製剤

<br>

<select name="product">

{% for p in products %}

<option value="{{p}}">{{p}}</option>

{% endfor %}

</select>

<br><br>

重量 (g)

<br>

<input type="number" step="0.1" name="weight" required>

<br><br>

<button type="submit">

送信

</button>

</form>

</body>
