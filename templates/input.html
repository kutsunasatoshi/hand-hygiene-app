<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>アルコール入力</title>
<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
<main class="shell">
<header class="topbar">
<div class="brand"><span class="brand-mark"></span>Hand Hygiene</div>
<nav class="nav">
<a href="/">入力</a>
<a href="/ranking">個人ランキング</a>
<a href="/ward_ranking">病棟ランキング</a>
<a href="/dashboard">ダッシュボード</a>
<a href="/staff/{{staff_id}}">履歴</a>
<a href="/calendar/{{staff_id}}">カレンダー</a>
</nav>
</header>

<section class="hero compact-card">
<p class="eyebrow">QR Input</p>
<h1>スタッフ {{staff_id}}</h1>
<p class="subtitle">製剤を選んで、現在のボトル重量を入力してください。</p>
<div class="stat-strip">
<span class="pill">直近重量 <strong>{% if last_weight is not none %}{{last_weight}} g{% else %}未登録{% endif %}</strong></span>
</div>
</section>

<section class="card compact-card">
<form method="post">
<div class="field">
<label for="product">アルコール製剤</label>
<select name="product" id="product">
{% for p in products %}
<option value="{{p}}" {% if p==last_product %}selected{% endif %}>{{p}}</option>
{% endfor %}
</select>
</div>

<div class="field">
<label for="weight">重量 (g)</label>
<input type="number" step="0.1" inputmode="decimal" name="weight" id="weight" required autofocus>
</div>

<button type="submit">送信</button>
</form>

{% if success %}
<div id="success" class="message success">入力しました</div>
{% endif %}

{% if error %}
<div class="message error">{{error}}</div>
{% endif %}
</section>
</main>
</body>
</html>
