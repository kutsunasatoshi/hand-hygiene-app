<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>アルコール入力</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
font-family: Arial;
text-align: center;
padding: 20px;
}

.container {
max-width: 400px;
margin: auto;
}

input, select {
width: 100%;
padding: 15px;
font-size: 20px;
margin-top: 10px;
}

button {
width: 100%;
padding: 20px;
font-size: 22px;
background-color: #007BFF;
color: white;
border: none;
margin-top: 20px;
}

button:hover {
background-color: #0056b3;
}

.success {
color: green;
font-weight: bold;
margin-top: 10px;
}

.lastweight {
color: #555;
margin-top: 10px;
}

.menu {
margin-bottom: 20px;
}

</style>

<script>

function afterSubmit() {

document.getElementById("weight").value = "";

document.getElementById("success").innerText = "入力しました";

setTimeout(function(){
document.getElementById("success").innerText = "";
},2000);

}

</script>

</head>

<body>

<div class="menu">

<a href="/">入力</a> |
<a href="/ranking">個人ランキング</a> |
<a href="/ward_ranking">病棟ランキング</a> |
<a href="/dashboard">病棟ダッシュボード</a> |
<a href="/staff/{{staff_id}}">履歴</a> |
<a href="/calendar/{{staff_id}}">カレンダー</a>

</div>

<div class="container">

<h2>スタッフ {{staff_id}}</h2>

<div class="lastweight">

直近重量： {{last_weight}} g

</div>

<form method="post" onsubmit="afterSubmit()">

<label>アルコール製剤</label>

<select name="product" id="product">

{% for p in products %}

<option value="{{p}}" {% if p==last_product %}selected{% endif %}>
{{p}}
</option>

{% endfor %}

</select>

<label>重量 (g)</label>

<input
type="number"
step="0.1"
inputmode="decimal"
name="weight"
id="weight"
required
autofocus
>

<button type="submit">

送信

</button>

</form>

<div id="success" class="success"></div>

</div>

</body>

</html>
