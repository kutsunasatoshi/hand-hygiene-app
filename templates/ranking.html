<!DOCTYPE html>
<html>
<head>
<title>アルコール使用量ランキング</title>
</head>

<body>

<hr>

<a href="/">入力</a> |
<a href="/ranking">個人ランキング</a> |

<a href="/dashboard">病棟ダッシュボード</a> |

<hr>

<h1>アルコール使用量ランキング</h1>

{% if graph_html %}
{{ graph_html | safe }}
{% else %}
<p>ランキング対象データがまだありません。</p>
{% endif %}

<h2>ランキング一覧</h2>

<table border="1" cellpadding="6">
<tr>
<th>順位</th>
<th>スタッフID</th>
<th>合計使用量(ml)</th>
<th>入力回数</th>
</tr>

{% for row in table_data %}
<tr>
<td>{{row.rank}}</td>
<td>{{row.staff_id}}</td>
<td>{{row.total_ml}}</td>
<td>{{row.n_records}}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
