<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>個人カレンダー</title>
<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
<main class="shell">
<header class="topbar">
<div class="brand"><span class="brand-mark"></span>Hand Hygiene</div>
<nav class="nav">
<a href="/">入力</a>
<a href="/ranking">個人ランキング</a>
<a href="/ward_ranking">病棟ランキング</a>
<a href="/dashboard">ダッシュボード</a>
<a href="/staff/{{staff_id}}">個人履歴</a>
</nav>
</header>

<section class="hero">
<p class="eyebrow">Monthly Calendar</p>
<h1>職員 {{staff_id}} のカレンダー</h1>
<p class="subtitle">日別のアルコール使用量を月単位で確認できます。</p>
</section>

<section class="card">
<div class="table-wrap">
<table class="calendar-table">
<tr>
<th>月</th>
<th>火</th>
<th>水</th>
<th>木</th>
<th>金</th>
<th>土</th>
<th>日</th>
</tr>

{% for week in calendar_data %}
<tr>
{% for day in week %}
<td>
{% if day.day %}
<span class="day-number">{{day.day}}</span>
<div class="day-ml">{{day.ml}} ml</div>
{% endif %}
</td>
{% endfor %}
</tr>
{% endfor %}
</table>
</div>
</section>
</main>
</body>
</html>
